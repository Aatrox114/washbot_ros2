base_driver_node:
  ros__parameters:
    serial_port: "/dev/ttyUSB0"
    baudrate: 115200

    cmd_topic: "/cmd_vel"
    odom_topic: "/odom"
    status_topic: "/base_status"

    odom_frame: "odom"
    base_frame: "base_link"

    publish_tf: true

    cmd_timeout_s: 0.5
    send_rate_hz: 50.0

    max_vx: 1.0
    max_vy: 1.0
    max_wz: 2.0
